# Docker Compose configuration for Agent Brain with PostgreSQL
# Use this for local development and testing with Postgres backend
#
# Usage:
#   docker-compose -f docker-compose-postgres.yml up -d
#   docker-compose -f docker-compose-postgres.yml down

services:
  postgres:
    image: postgres:17
    container_name: agent-brain-postgres
    environment:
      # Local development/test credentials - NOT for production
      # These values are referenced by tests and justfile commands
      POSTGRES_DB: agent_brain
      POSTGRES_USER: agent_brain_user
      POSTGRES_PASSWORD: dev_password  # Simple password for local testing only
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_brain_user -d agent_brain"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  # Named volume for Postgres data
  postgres_data:
    driver: local

  # Named volume for persistent configuration
  # Database will be stored in Postgres, not in this volume
  agent-brain-config:
    driver: local

# Network configuration (optional)
# networks:
#   agent-brain-net:
#     driver: bridge
